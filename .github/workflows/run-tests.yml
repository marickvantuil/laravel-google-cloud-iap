name: Run tests

on:
  push:
  pull_request:

jobs:
  load-matrix:
    runs-on: ubuntu-latest
    outputs:
      payload: ${{ steps.load.outputs.payload }}
    steps:
      - uses: actions/checkout@v4
      - name: Load matrix
        id: load
        run: echo "payload=$(jq -c '.payload' matrix.json)" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: load-matrix

    strategy:
      matrix:
        payload: ${{ fromJson(needs.load-matrix.outputs.payload) }}

    name: PHP ${{ matrix.payload.php }} - Laravel ${{ matrix.payload.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.payload.php }}
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.payload.laravel }}" "orchestra/testbench:${{ matrix.payload.testbench }}" --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run tests
        run: composer test
